services:
  nats:
    image: nats:alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ./nats-data:/data
      - ../nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  # One-shot: creates the JetStream stream before publishers/subscribers start.
  stream-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        nats -s nats://nats:4222 stream add TRADES \
          --subjects=trades.tick --storage=memory \
          --retention=limits --discard=old 2>/dev/null || true
        echo "stream-init: TRADES stream ready"
    restart: "no"

  # Example: build the plugin image for use in publisher/subscriber containers
